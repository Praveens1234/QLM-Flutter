pluginManagement {
    def flutterSdkPath = {
        def properties = new Properties()
        def localPropertiesFile = rootProject.file("local.properties")
        if (localPropertiesFile.exists()) {
            localPropertiesFile.withInputStream { properties.load(it) }
        }
        def flutterSdkPath = properties.getProperty("flutter.sdk")
        if (flutterSdkPath != null) {
            return flutterSdkPath
        }
        // Fallback: use FLUTTER_ROOT env var (set by subosito/flutter-action on CI)
        def flutterRoot = System.getenv("FLUTTER_ROOT")
        if (flutterRoot != null) {
            return flutterRoot
        }
        // Fallback to system flutter command
        def flutterCmd = OS.isFamilyWindows() ? "where flutter" : "which flutter"
        def process = flutterCmd.execute()
        process.waitFor()
        if (process.exitValue() == 0) {
            def flutterPath = process.text.trim()
            // Follow symlinks
            def flutterFile = new File(flutterPath)
            if (flutterFile.exists()) {
                flutterPath = flutterFile.canonicalPath
            }
            return new File(flutterPath).parentFile.parent
        }
        throw new GradleException("flutter.sdk not set and flutter command not found")
    }()

    includeBuild("$flutterSdkPath/packages/flutter_tools/gradle")

    repositories {
        google()
        mavenCentral()
        gradlePluginPortal()
    }
}

plugins {
    id "dev.flutter.flutter-plugin-loader" version "1.0.0"
    id "com.android.application" version "8.5.0" apply false
    id "org.jetbrains.kotlin.android" version "1.9.10" apply false
}

rootProject.name = "qlm_mobile"
include ":app"
