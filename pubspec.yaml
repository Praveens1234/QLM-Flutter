name: qlm_mobile
description: QLM Trading Platform — Professional Mobile Client
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  # Networking
  http: ^1.2.0
  web_socket_channel: ^2.4.0
  # State Management
  provider: ^6.1.1
  # Persistence
  shared_preferences: ^2.2.2
  # Typography
  google_fonts: ^6.1.0
  # UI
  cupertino_icons: ^1.0.6
  # Formatting
  intl: ^0.19.0
  # Syntax Highlighting
  flutter_highlight: ^0.7.0
  # File Picking & Sharing
  file_picker: ^6.1.1
  share_plus: ^10.1.2
  path_provider: ^2.1.5
  # Export Utilities
  csv: ^6.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.1

flutter:
  uses-material-design: true
